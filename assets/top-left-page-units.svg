<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280" role="img" aria-labelledby="t1">
  <title id="t1">Top-left page: origin, axes, bbox</title>
  <rect width="640" height="280" fill="#f9fbff"/>
  <rect x="48" y="48" width="260" height="190" fill="#ffffff" stroke="#b8c7f2" stroke-width="2" rx="4"/>
  <text x="48" y="38" fill="#5a6c99" font-size="13" font-family="system-ui,sans-serif">Page (top-left units)</text>
  <circle cx="48" cy="48" r="6" fill="#3268dd"/>
  <text x="58" y="56" fill="#122041" font-size="12" font-family="system-ui,sans-serif" font-weight="600">(0,0) top-left</text>
  <line x1="48" y1="48" x2="298" y2="48" stroke="#6a7fb4" stroke-width="2"/>
  <polygon points="298,48 288,44 288,52" fill="#6a7fb4"/>
  <text x="302" y="52" fill="#6a7fb4" font-size="12" font-family="system-ui,sans-serif">+x right</text>
  <line x1="48" y1="48" x2="48" y2="238" stroke="#6a7fb4" stroke-width="2"/>
  <polygon points="48,238 44,228 52,228" fill="#6a7fb4"/>
  <text x="8" y="255" fill="#6a7fb4" font-size="12" font-family="system-ui,sans-serif">+y down</text>
  <rect x="118" y="98" width="120" height="72" fill="rgba(50,104,221,0.08)" stroke="#ff3d66" stroke-width="2.5" rx="2"/>
  <circle cx="118" cy="98" r="5" fill="#cc2f53"/>
  <text x="72" y="92" fill="#cc2f53" font-size="11" font-family="system-ui,sans-serif" font-weight="600">(x1,y1)</text>
  <circle cx="238" cy="170" r="5" fill="#cc2f53"/>
  <text x="244" y="188" fill="#cc2f53" font-size="11" font-family="system-ui,sans-serif" font-weight="600">(x2,y2)</text>
  <text x="340" y="72" fill="#122041" font-size="13" font-family="system-ui,sans-serif" font-weight="600">Legend</text>
  <text x="340" y="98" fill="#526289" font-size="11" font-family="system-ui,sans-serif">- Blue: origin</text>
  <text x="340" y="118" fill="#526289" font-size="11" font-family="system-ui,sans-serif">- Red: bbox corners</text>
  <text x="340" y="138" fill="#526289" font-size="11" font-family="system-ui,sans-serif">- Overlay px = pt x scale</text>
</svg>
